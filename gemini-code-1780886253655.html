<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白金 3D 模型展示舞台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            /* 打造高级感白金微渐变背景 */
            background: radial-gradient(circle at center, #ffffff 0%, #e8e8ed 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* UI 界面：极简白金质感 */
        #ui-overlay {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            pointer-events: none;
        }
        h1 {
            font-size: 24px;
            font-weight: 300;
            color: #1d1d1f;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        p {
            font-size: 12px;
            color: #86868b;
            letter-spacing: 1px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            font-size: 14px;
            color: #86868b;
            background: rgba(255, 255, 255, 0.8);
            padding: 12px 24px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: opacity 0.5s;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="loading">正在加载白金 3D 舞台及模型数据...</div>

    <div id="ui-overlay">
        <h1>Platinum Studio</h1>
        <p>3D SOG MODEL VIEWER / 🏷️ model233</p>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 1. 初始化 Three.js 核心场景 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // 让场景背景透明，显出底层的 CSS 白金渐变色
        scene.background = null; 

        // 相机设置
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        // 渲染器设置（开启抗锯齿和阴影支持）
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // 鼠标轨道控制器
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // 限制不能转到地板以下

        // --- 2. 打造白金高光灯光系统 ---
        // 环境光：提供柔和的基础亮度
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        // 主高光灯（聚光灯）：从右上方打下来，制造高端金属高光
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(5, 10, 7);
        dirLight1.castShadow = true;
        dirLight1.shadow.mapSize.width = 2048;
        dirLight1.shadow.mapSize.height = 2048;
        scene.add(dirLight1);

        // 辅助轮廓光：从左后方打来，给物体勾勒边缘白金光边
        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
        dirLight2.position.set(-5, 5, -5);
        scene.add(dirLight2);

        // --- 3. 建造白金展示底座（舞台） ---
        const floorGeo = new THREE.CylinderGeometry(4, 4.2, 0.3, 64);
        const floorMat = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            roughness: 0.1,  // 低粗糙度，呈现镜面反光感
            metalness: 0.1,  // 略带一点点陶瓷/白金光泽
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -1.5;
        floor.receiveShadow = true;
        scene.add(floor);


        // --- 4. 核心：加载并解析 .sog 文件 ---
        // 由于 .sog 是您特定的包含 WebP 贴图和顶点数据的混和格式，这里编写一个二进制流解析器
        fetch('model233.sog')
            .then(res => res.arrayBuffer())
            .then(buffer => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').remove(), 500);

                // 将底层数据视作 U8 数组寻找 WebP 图片头
                const u8Array = new Uint8Array(buffer);
                
                // 寻找特征值：RIFF .... WEBP
                let webpStart = -1;
                for(let i=0; i<u8Array.length - 12; i++) {
                    if(u8Array[i] === 0x52 && u8Array[i+1] === 0x49 && u8Array[i+2] === 0x46 && u8Array[i+3] === 0x46 && // RIFF
                       u8Array[i+8] === 0x57 && u8Array[i+9] === 0x45 && u8Array[i+10] === 0x42 && u8Array[i+11] === 0x50) { // WEBP
                        webpStart = i;
                        break;
                    }
                }

                // 提取材质贴图
                let material = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.2, metalness: 0.5 }); // 兜底白金材质
                if(webpStart !== -1) {
                    // 假设剩余文件或特定长度内是图片，这里提取到文件末尾作为图片示例
                    const imgBlob = new Blob([u8Array.subarray(webpStart)], { type: 'image/webp' });
                    const imgUrl = URL.createObjectURL(imgBlob);
                    const texture = new THREE.TextureLoader().load(imgUrl);
                    material.map = texture;
                    material.roughness = 0.3;
                    material.metalness = 0.2;
                    material.needsUpdate = true;
                }

                // 创建演示几何体 
                // (注意：实际解析 SOG 内精准的顶点坐标需要完整获知您的软件写入格式，此处先采用高精度球体配合解析出的贴图进行黄金比例渲染展示)
                const geometry = new THREE.SphereGeometry(1.8, 64, 64);
                
                // 给模型应用材质
                const modelMesh = new THREE.Mesh(geometry, material);
                modelMesh.position.y = 0.5;
                modelMesh.castShadow = true;
                modelMesh.receiveShadow = true;
                scene.add(modelMesh);

                // 让物体在舞台上优雅地自转
                function animateModel() {
                    requestAnimationFrame(animateModel);
                    modelMesh.rotation.y += 0.005;
                }
                animateModel();
            })
            .catch(err => {
                console.error("加载文件失败，请确保 model233.sog 与本工程在同一根目录下", err);
                document.getElementById('loading').innerText = "未检测到本地 model233.sog 文件，请检查路径。";
            });


        // --- 5. 动画与自适应自调节 ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
